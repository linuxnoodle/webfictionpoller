services:
  app:
    image: ghcr.io/linuxnoodle/webfictionpoller:latest
    ports:
      - "8080:8080"
    environment:
      - DB_PATH=/data/data.db
      - ADDR=:8080
      - POLL_INTERVAL=15m
      - COMIC_POLL_INTERVAL=1h
      - FLARESOLVERR_URL=http://flaresolverr:8191
      - LOG_DIR=/data/logs
      - PROVIDERS_DIR=/data/providers
      - STORAGE_BACKEND=fs
      - STORAGE_FS_ROOT=/mnt/stories/blobs
      - AUTO_PROMOTE_THRESHOLD=10
      - COMPOSE_PROJECT_DIR=/opt/webfictionpoller
    volumes:
      - ./data:/data
      - /mnt/shared_pool/stories:/mnt/stories
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/opt/webfictionpoller/docker-compose.yml:ro
    depends_on:
      - flaresolverr
    restart: unless-stopped
    networks:
      - default

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped
    networks:
      - default
