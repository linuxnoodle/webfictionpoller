services:
  app:
    image: ghcr.io/linuxnoodle/webfictionpoller:latest
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=postgres://wfp:wfp@postgres:5432/webfictionpoller?sslmode=disable
      - ADDR=:8080
      - POLL_INTERVAL=15m
      - COMIC_POLL_INTERVAL=1h
      - FLARESOLVERR_URL=http://flaresolverr:8191
      - LOG_DIR=/data/logs
      - PROVIDERS_DIR=/data/providers
      - STORAGE_BACKEND=fs
      - STORAGE_FS_ROOT=/mnt/stories/blobs
      - AUTO_PROMOTE_THRESHOLD=10
      - COMPOSE_PROJECT_DIR=/opt/webfictionpoller
    volumes:
      - ./data:/data
      - /mnt/shared_pool/stories:/mnt/stories
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.yml:/opt/webfictionpoller/docker-compose.yml:ro
    depends_on:
      postgres:
        condition: service_healthy
      flaresolverr:
        condition: service_started
    restart: unless-stopped
    networks:
      - default

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: webfictionpoller
      POSTGRES_USER: wfp
      POSTGRES_PASSWORD: wfp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wfp"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - default

  flaresolverr:
    image: ghcr.io/flaresolverr/flaresolverr:latest
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped
    networks:
      - default

volumes:
  pgdata:
