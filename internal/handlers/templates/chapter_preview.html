{{define "chapter_preview"}}
<div class="flex items-start gap-2 sm:gap-3 mb-3 pb-3 border-b border-neutral-700">
    {{if .FaviconURL}}<img src="{{.FaviconURL}}" alt="" class="w-4 h-4 mt-1 flex-shrink-0 hidden sm:block" onerror="this.style.display='none'">{{end}}
    <div class="min-w-0 flex-1">
        <h4 class="text-sm sm:text-base font-semibold text-neutral-100 leading-tight">{{.Chapter.Title}}</h4>
        <div class="flex items-center gap-2 mt-1">
            <span class="text-xs text-neutral-400">{{.Chapter.SeriesTitle}}</span>
            <span class="text-neutral-700">&middot;</span>
            <span class="text-xs text-neutral-500">{{.Chapter.PublishedAt.Format "Jan 02, 2006 15:04"}}</span>
        </div>
    </div>
    <div class="flex items-center gap-0.5 flex-shrink-0"
         x-data="{ rating: {{f64f .Chapter.SeriesRating}}, sid: {{.Chapter.SeriesID}} }">
        <button @click="rating = Math.max(0, Math.round((rating - 0.1) * 10) / 10); htmx.ajax('POST', '/api/series/' + sid + '/rating', {values:{rating:rating}, swap:'none'})"
                class="w-5 h-5 flex items-center justify-center text-neutral-500 hover:text-neutral-200 bg-neutral-800 hover:bg-neutral-700 rounded text-xs">&#9660;</button>
        <input type="number" min="0" max="10" step="0.1" x-model.number="rating"
               @change="rating = Math.round(Math.max(0, Math.min(10, rating)) * 10) / 10; htmx.ajax('POST', '/api/series/' + sid + '/rating', {values:{rating:rating}, swap:'none'})"
               class="w-10 text-center bg-neutral-800 border border-neutral-700 rounded text-xs text-neutral-300 py-0.5 focus:outline-none focus:border-neutral-500" />
        <button @click="rating = Math.min(10, Math.round((rating + 0.1) * 10) / 10); htmx.ajax('POST', '/api/series/' + sid + '/rating', {values:{rating:rating}, swap:'none'})"
                class="w-5 h-5 flex items-center justify-center text-neutral-500 hover:text-neutral-200 bg-neutral-800 hover:bg-neutral-700 rounded text-xs">&#9650;</button>
    </div>
</div>
<div class="preview-content prose prose-invert prose-sm max-w-none">
{{.Content}}
</div>
{{end}}
