{{define "chapter_preview"}}
<div class="flex items-start gap-2 sm:gap-3 mb-3 pb-3 border-b border-neutral-700">
    {{if .FaviconURL}}<img src="{{.FaviconURL}}" alt="" class="w-4 h-4 mt-1 flex-shrink-0 hidden sm:block">{{end}}
    <div class="min-w-0 flex-1">
        <h4 class="text-sm sm:text-base font-semibold text-neutral-100 leading-tight">{{.Chapter.Title}}</h4>
        <div class="flex items-center gap-2 mt-1">
            <span class="text-xs text-neutral-400 cursor-pointer hover:text-neutral-200" onclick="goToSeries({{.Chapter.SeriesID}})">{{.Chapter.SeriesTitle}}</span>
            <span class="text-neutral-700">&middot;</span>
            <span class="text-xs text-neutral-500">{{.Chapter.PublishedAt.Format "Jan 02, 2006 15:04"}}</span>
        </div>
    </div>
</div>
<div class="preview-content prose prose-invert prose-sm max-w-none">
{{.Content}}
</div>
{{end}}
