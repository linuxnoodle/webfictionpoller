{{define "nav"}}
<style>@keyframes spin{to{transform:rotate(360deg)}}.spinner{animation:spin 1s linear infinite;display:inline-block}</style>
<script>
window.addEventListener('pageshow',function(e){if(e.persisted){htmx.process(document.body)}});
function ratingColor(v) {
    if (v < 0) return 'hsl(0,0%,50%)';
    var h = (v / 10) * 120;
    return 'hsl(' + h + ',65%,50%)';
}
function ratingApplyStyle(inp, r) {
    var c = ratingColor(r);
    inp.style.color = r < 0 ? '' : c;
    inp.style.borderColor = r < 0 ? '' : c;
    inp.style.backgroundColor = r < 0 ? '' : c.replace('50%)', '12%)');
    if (inp.parentElement) {
        var btns = inp.parentElement.querySelectorAll('button');
        btns.forEach(function(b) {
            b.style.color = r < 0 ? '' : c;
        });
    }
}
function ratingInput(el) {
    el.addEventListener('focus', function() { if (this.dataset.u === '1') { this.value = ''; this.type = 'number'; } });
    el.addEventListener('blur', function() {
        var raw = this.value.trim();
        if (raw === '' || raw === 'U' || raw === 'u') { this.dataset.u = '1'; this.type = 'text'; this.value = 'U'; ratingApplyStyle(this, -1); this._ratingSave(-1); return; }
        var v = parseFloat(raw);
        if (isNaN(v)) { this.dataset.u = '1'; this.type = 'text'; this.value = 'U'; ratingApplyStyle(this, -1); this._ratingSave(-1); return; }
        v = Math.round(Math.max(0, Math.min(10, v)) * 10) / 10;
        this.dataset.u = '0'; this.type = 'number'; this.value = v.toFixed(1);
        ratingApplyStyle(this, v);
        this._ratingSave(v);
    });
    el.addEventListener('keydown', function(e) { if (e.key === 'Enter') this.blur(); });
}
var _ratingEls = {};
function ratingSync(sid, src, r) {
    delete _ratingEls[sid];
    document.querySelectorAll('[data-rating-sid="'+sid+'"] span[data-rating-value]').forEach(function(el) {
        if (el === src || el.tagName === 'INPUT') return;
        if (r < 0) { el.textContent = 'U'; el.dataset.u = '1'; }
        else { el.textContent = r.toFixed(1); el.dataset.u = '0'; }
        ratingApplyStyle(el, r);
    });
}
function ratingDown(btn) {
    var c = btn.parentElement;
    var el = c.querySelector('[data-rating-value]');
    if (!el) return;
    var r = el.dataset.u === '1' || el.textContent === 'U' ? 0 : parseFloat(el.textContent) || 0;
    r = r <= 0 ? -1 : Math.round((r - 0.1) * 10) / 10;
    if (r < 0) {
        el.textContent = 'U'; el.dataset.u = '1';
    } else {
        el.textContent = r.toFixed(1); el.dataset.u = '0';
    }
    ratingApplyStyle(el, r);
    ratingSaveFromEl(el, r);
}
function ratingUp(btn) {
    var c = btn.parentElement;
    var el = c.querySelector('[data-rating-value]');
    if (!el) return;
    var r = el.dataset.u === '1' || el.textContent === 'U' ? 0 : parseFloat(el.textContent) || 0;
    r = Math.min(10, Math.round((r + 0.1) * 10) / 10);
    el.textContent = r.toFixed(1); el.dataset.u = '0';
    ratingApplyStyle(el, r);
    ratingSaveFromEl(el, r);
}
document.addEventListener('error', function(e) { if (e.target.tagName === 'IMG') e.target.style.display = 'none'; }, true);
document.addEventListener('click', function(e) {
    var span = e.target.closest('span[data-rating-value]');
    if (!span) return;
    var container = span.closest('[data-rating-sid]');
    if (!container) return;
    e.stopPropagation();
    if (span.tagName === 'INPUT') return;
    var sid = container.dataset.ratingSid;
    var v = parseFloat(span.dataset.ratingValue);
    var save = function(r) {
        ratingSync(sid, null, r);
        htmx.ajax('POST', '/api/series/' + sid + '/rating', {values:{rating:r}, swap:'none'});
    };
    var input = document.createElement('input');
    input.type = 'number'; input.step = '0.1'; input.min = '0'; input.max = '10';
    input.dataset.sid = sid; input.dataset.u = v < 0 ? '1' : '0';
    input.value = v < 0 ? '' : v.toFixed(1);
    input.className = span.className;
    input.setAttribute('autocomplete', 'off');
    input.style.width = span.style.width || '';
    ratingInput(input);
    input._ratingSave = save;
    if (v >= 0) ratingApplyStyle(input, v);
    span.replaceWith(input);
    input.focus(); input.select();
    input.addEventListener('blur', function() {
        var s = document.createElement('span');
        s.dataset.ratingValue = ''; s.dataset.sid = sid; s._ratingInited = true;
        s.className = input.className; s.setAttribute('data-rating-value', '');
        var rv = input.dataset.u === '1' ? -1 : parseFloat(input.value) || -1;
        s._ratingSave = save;
        if (rv < 0) { s.textContent = 'U'; }
        else { s.textContent = rv.toFixed(1); }
        input.replaceWith(s);
        ratingApplyStyle(s, rv < 0 ? -1 : rv);
    });
}, true);
function startPoll(btn) {
    var icon = document.getElementById('poll-icon');
    var spinner = document.getElementById('poll-spinner');
    var status = document.getElementById('poll-status');
    var statusMobile = document.getElementById('poll-status-mobile');
    btn.disabled = true;
    icon.style.display = 'none';
    spinner.style.display = '';
    status.style.display = '';
    status.textContent = 'Starting...';
    if (statusMobile) { statusMobile.style.display = ''; statusMobile.textContent = 'Starting...'; }
    fetch('/api/poll', {method:'POST', headers:{'X-CSRF-Token':_csrf}}).then(function(r){return r.json()}).then(function(d) {
        if (!d.queued) { btn.disabled = false; icon.style.display = ''; spinner.style.display = 'none'; status.style.display = 'none'; if (statusMobile) statusMobile.style.display = 'none'; return; }
        var label = '0/' + d.queued;
        status.textContent = label;
        if (statusMobile) statusMobile.textContent = label;
        var poll = setInterval(function() {
            fetch('/api/poll/progress').then(function(r){return r.json()}).then(function(p) {
                var lbl = p.done + '/' + p.total;
                status.textContent = lbl;
                if (statusMobile) statusMobile.textContent = lbl;
                if (!p.active) {
                    clearInterval(poll);
                    btn.disabled = false; icon.style.display = ''; spinner.style.display = 'none';
                    status.textContent = 'Done'; if (statusMobile) statusMobile.textContent = 'Done';
                    setTimeout(function(){ status.style.display = 'none'; if (statusMobile) statusMobile.style.display = 'none'; location.reload(); }, 800);
                }
            });
        }, 1500);
    });
}
function ratingSaveFromEl(el, r) {
    var c = el.closest('[data-rating-sid]');
    if (!c) return;
    var sid = c.dataset.ratingSid;
    ratingSync(sid, el, r);
    htmx.ajax('POST', '/api/series/' + sid + '/rating', {values:{rating:r}, swap:'none'});
}
</script>

            <svg id="poll-spinner" style="display:none" class="spinner w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.48-8.48l2.83-2.83M2 12h4m12 0h4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83"/></svg>
        </button>

                <span x-show="updateAvail" style="display:none" class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full shadow-lg shadow-red-500/50"></span>
            </button>
            <div x-show="open" x-transition.opacity.duration.200ms style="display:none"
                 @click="open = false"
                 class="absolute right-0 mt-3 w-56 glass-panel py-2 z-50">
                <a href="/admin/version" class="flex items-center justify-between px-4 py-2.5 text-sm hover:bg-white/10 transition-colors">
                    <span>Version & Updates</span>
                    <span x-show="updateAvail" style="display:none" class="w-2 h-2 bg-primary rounded-full shadow-lg shadow-primary/50"></span>
                </a>
                <div class="border-t border-white/5 my-1"></div>
                <a href="/series/import" class="block px-4 py-2 text-sm hover:bg-white/10 transition-colors">Import OPML</a>
                <a href="/series/export" class="block px-4 py-2 text-sm hover:bg-white/10 transition-colors">Export OPML</a>
                <a href="/series/backup" class="block px-4 py-2 text-sm hover:bg-white/10 transition-colors">Export Backup</a>
                <div class="border-t border-white/5 my-1"></div>
                <a href="/admin/plugins" class="block px-4 py-2 text-sm hover:bg-white/10 transition-colors">Plugins</a>
                <a href="/admin/library" class="block px-4 py-2 text-sm hover:bg-white/10 transition-colors">Library & OPDS</a>
                <a href="/admin/tokens" class="block px-4 py-2 text-sm hover:bg-white/10 transition-colors">API Tokens</a>
                <a href="/admin/logs" class="block px-4 py-2 text-sm hover:bg-white/10 transition-colors">Logs</a>

                <form method="POST" action="/logout" class="block px-4 py-2 text-sm text-red-400 hover:bg-red-400/10 transition-colors"><button type="submit" class="w-full text-left font-medium">Logout</button></form>
            </div>
        </div>
    </div>
    <button class="sm:hidden text-muted hover:text-white w-10 h-10 flex items-center justify-center rounded-lg hover:bg-white/10 transition-colors"

    </button>
</nav>
