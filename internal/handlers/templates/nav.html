{{define "nav"}}
<script>
function ratingColor(v) {
    if (v < 0) return 'hsl(0,0%,50%)';
    var h = (v / 10) * 120;
    return 'hsl(' + h + ',65%,50%)';
}
function ratingApplyStyle(inp, r) {
    var c = ratingColor(r);
    inp.style.color = r < 0 ? '' : c;
    inp.style.borderColor = r < 0 ? '' : c;
    inp.style.backgroundColor = r < 0 ? '' : c.replace('50%)', '12%)');
    var btns = inp.parentElement.querySelectorAll('button');
    btns.forEach(function(b) {
        b.style.color = r < 0 ? '' : c;
    });
}
function ratingInput(el) {
    el.addEventListener('focus', function() { if (this.dataset.u === '1') { this.value = ''; this.type = 'number'; } });
    el.addEventListener('blur', function() {
        var raw = this.value.trim();
        if (raw === '' || raw === 'U' || raw === 'u') { this.dataset.u = '1'; this.type = 'text'; this.value = 'U'; ratingApplyStyle(this, -1); this._ratingSave(-1); return; }
        var v = parseFloat(raw);
        if (isNaN(v)) { this.dataset.u = '1'; this.type = 'text'; this.value = 'U'; ratingApplyStyle(this, -1); this._ratingSave(-1); return; }
        v = Math.round(Math.max(0, Math.min(10, v)) * 10) / 10;
        this.dataset.u = '0'; this.type = 'number'; this.value = v.toFixed(1);
        ratingApplyStyle(this, v);
        this._ratingSave(v);
    });
    el.addEventListener('keydown', function(e) { if (e.key === 'Enter') this.blur(); });
}
var _ratingEls = {};
function ratingSync(src, r) {
    var sid = src.dataset.sid;
    var els = _ratingEls[sid];
    if (!els) { els = document.querySelectorAll('input[data-sid="'+sid+'"]'); _ratingEls[sid] = els; }
    els.forEach(function(inp) {
        if (inp === src) return;
        if (r < 0) { inp.dataset.u = '1'; inp.type = 'text'; inp.value = 'U'; }
        else { inp.dataset.u = '0'; inp.type = 'number'; inp.value = r.toFixed(1); }
        ratingApplyStyle(inp, r);
    });
}
function ratingDown(btn) {
    var inp = btn.parentElement.querySelector('input');
    var r = inp.dataset.u === '1' ? 0 : parseFloat(inp.value) || 0;
    r = r <= 0 ? -1 : Math.round((r - 0.1) * 10) / 10;
    if (r < 0) { inp.dataset.u = '1'; inp.type = 'text'; inp.value = 'U'; }
    else { inp.dataset.u = '0'; inp.type = 'number'; inp.value = r.toFixed(1); }
    ratingApplyStyle(inp, r);
    inp._ratingSave(r);
}
function ratingUp(btn) {
    var inp = btn.parentElement.querySelector('input');
    var r = inp.dataset.u === '1' ? 0 : parseFloat(inp.value) || 0;
    r = Math.min(10, Math.round((r + 0.1) * 10) / 10);
    inp.dataset.u = '0'; inp.type = 'number'; inp.value = r.toFixed(1);
    ratingApplyStyle(inp, r);
    inp._ratingSave(r);
}
document.addEventListener('error', function(e) { if (e.target.tagName === 'IMG') e.target.style.display = 'none'; }, true);
function initRatings() {
    document.querySelectorAll('[data-rating-sid]').forEach(function(c) {
        var sid = c.dataset.ratingSid;
        var input = c.querySelector('input');
        if (!input || input._ratingInited) return;
        input._ratingInited = true;
        input.dataset.sid = sid;
        input._ratingSave = function(r) {
            ratingSync(input, r);
            htmx.ajax('POST', '/api/series/' + sid + '/rating', {values:{rating:r}, swap:'none'});
        };
        var v = parseFloat(input.dataset.ratingValue);
        ratingInput(input);
        if (v < 0) {
            input.type = 'text'; input.value = 'U'; input.dataset.u = '1';
        } else {
            input.type = 'number'; input.value = v.toFixed(1); input.dataset.u = '0';
            ratingApplyStyle(input, v);
        }
    });
}
initRatings();
document.addEventListener('htmx:afterSettle', function() { _ratingEls = {}; initRatings(); });
</script>
<nav class="bg-neutral-800 border-b border-neutral-700 px-4 py-3 flex items-center justify-between">
    <a href="/" class="text-lg font-bold text-neutral-200 hover:text-white">WebFiction Poller</a>
    <div class="hidden sm:flex items-center gap-2">
        <a href="/series" class="text-neutral-400 hover:text-neutral-200 px-2 py-1 text-sm">Series</a>
        <a href="/series/add" title="Add series"
           class="text-neutral-300 hover:text-white bg-neutral-700 hover:bg-neutral-600 w-8 h-8 flex items-center justify-center rounded font-bold text-lg leading-none">+</a>
        <button hx-post="/api/poll" hx-swap="none" hx-on::after-request="location.reload()" title="Poll now"
                class="text-neutral-400 hover:text-neutral-200 hover:bg-neutral-700 w-8 h-8 flex items-center justify-center rounded">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M2.5 22v-6h6M2 11.5a10 10 0 0 1 18.8-4.3M22 12.5a10 10 0 0 1-18.8 4.2"/></svg>
        </button>
        <div class="relative" x-data="{ open: false, updateAvail: false }"
             x-init="fetch('/api/version').then(r=>r.json()).then(d=>updateAvail=d.update_available)">
            <button @click="open = !open" @click.outside="open = false"
                    class="relative text-neutral-400 hover:text-neutral-200 hover:bg-neutral-700 w-8 h-8 flex items-center justify-center rounded">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                <span x-show="updateAvail" style="display:none" class="absolute top-1 right-1 w-2.5 h-2.5 bg-red-500 rounded-full"></span>
            </button>
            <div x-show="open" x-transition style="display:none"
                 @click="open = false"
                 class="absolute right-0 mt-2 w-56 bg-neutral-800 border border-neutral-700 rounded-lg shadow-lg py-1 z-50">
                <a href="/admin/version" class="flex items-center justify-between px-4 py-2 text-sm text-neutral-300 hover:bg-neutral-700">
                    <span>Version & Updates</span>
                    <span x-show="updateAvail" style="display:none" class="w-2 h-2 bg-emerald-400 rounded-full"></span>
                </a>
                <div class="border-t border-neutral-700 my-1"></div>
                <a href="/series/import" class="block px-4 py-2 text-sm text-neutral-300 hover:bg-neutral-700">Import OPML</a>
                <a href="/series/export" class="block px-4 py-2 text-sm text-neutral-300 hover:bg-neutral-700">Export OPML</a>
                <a href="/series/backup" download class="block px-4 py-2 text-sm text-neutral-300 hover:bg-neutral-700">Export Backup</a>
                <div class="border-t border-neutral-700 my-1"></div>
                <a href="/admin/providers" class="block px-4 py-2 text-sm text-neutral-300 hover:bg-neutral-700">Providers</a>
                <a href="/admin/logs" class="block px-4 py-2 text-sm text-neutral-300 hover:bg-neutral-700">Logs</a>
                <div class="border-t border-neutral-700 my-1"></div>
                <a href="/logout" class="block px-4 py-2 text-sm text-red-400 hover:bg-neutral-700">Logout</a>
            </div>
        </div>
    </div>
    <button class="sm:hidden text-neutral-400 hover:text-neutral-200 w-8 h-8 flex items-center justify-center rounded hover:bg-neutral-700"
            onclick="document.getElementById('mobile-nav').classList.toggle('hidden')">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
</nav>

     x-init="fetch('/api/version').then(r=>r.json()).then(d=>updateAvail=d.update_available)">
    <a href="/admin/version" class="flex items-center justify-between px-3 py-2 text-sm text-neutral-300 hover:bg-neutral-700 rounded">
        <span>Version & Updates</span>
        <span x-show="updateAvail" style="display:none" class="w-2 h-2 bg-emerald-400 rounded-full"></span>
    </a>
    <a href="/series" class="block px-3 py-2 text-sm text-neutral-300 hover:bg-neutral-700 rounded">Series</a>
    <a href="/series/add" class="block px-3 py-2 text-sm text-neutral-300 hover:bg-neutral-700 rounded">Add Series</a>
    <button hx-post="/api/poll" hx-swap="none" hx-on::after-request="location.reload()" class="w-full text-left px-3 py-2 text-sm text-neutral-300 hover:bg-neutral-700 rounded">Poll Now</button>

    <a href="/series/import" class="block px-3 py-2 text-sm text-neutral-300 hover:bg-neutral-700 rounded">Import OPML</a>
    <a href="/series/export" class="block px-3 py-2 text-sm text-neutral-300 hover:bg-neutral-700 rounded">Export OPML</a>
    <a href="/series/backup" download class="block px-3 py-2 text-sm text-neutral-300 hover:bg-neutral-700 rounded">Export Backup</a>
    <a href="/admin/providers" class="block px-3 py-2 text-sm text-neutral-300 hover:bg-neutral-700 rounded">Providers</a>
    <a href="/admin/logs" class="block px-3 py-2 text-sm text-neutral-300 hover:bg-neutral-700 rounded">Logs</a>
    <div class="border-t border-neutral-700 my-1"></div>
    <a href="/logout" class="block px-3 py-2 text-sm text-red-400 hover:bg-neutral-700 rounded">Logout</a>
</div>
{{end}}
