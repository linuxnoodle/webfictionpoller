{{define "comic_reader.html"}}
<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comic Reader - WebFiction Poller</title>
    <meta name="csrf-token" content="{{.CSRFToken}}">
    <script>var _csrf="{{.CSRFToken}}"</script>
    <link rel="stylesheet" href="/static/app.css">
    <style>
        .bars-visible { transform: translateY(0) !important; }
        .bar-top { transform: translateY(-100%); transition: transform 0.25s ease; }
        .bar-bottom { transform: translateY(100%); transition: transform 0.25s ease; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-neutral-200 min-h-screen font-sans overflow-x-hidden">
    <div class="fixed inset-0 flex items-center justify-center bg-[#0a0a0a] z-[200]" id="loading">
        <div class="w-8 h-8 border-4 border-neutral-800 border-t-blue-500 rounded-full animate-spin"></div>
    </div>

    <div class="bar-top fixed top-0 left-0 right-0 z-[100] bg-neutral-950/95 backdrop-blur border-b border-neutral-800 px-4 py-3 flex items-center gap-4 shadow-sm" id="top-bar">
        <a href="/comics" class="text-neutral-400 hover:text-neutral-200 text-sm font-medium transition-colors flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            Back
        </a>
        <span class="flex-1 text-sm font-semibold text-neutral-200 truncate" id="chapter-title">Loading...</span>
        <span class="text-xs font-medium text-neutral-500 tabular-nums" id="page-info">0/0</span>
    </div>

    <div class="max-w-4xl mx-auto w-full" id="pages"></div>

    <div class="bar-bottom fixed bottom-0 left-0 right-0 z-[100] bg-neutral-950/95 backdrop-blur border-t border-neutral-800 px-4 py-3 flex items-center gap-4 shadow-sm" id="bottom-bar">
        <span class="text-xs font-medium text-neutral-500 tabular-nums w-12" id="bottom-info">0/0</span>
        <div class="flex-1 h-1.5 bg-neutral-800 rounded-full overflow-hidden cursor-pointer group" id="progress-bar">
            <div class="h-full bg-blue-500 transition-all duration-200 group-hover:bg-blue-400" id="progress-fill" style="width:0%"></div>
        </div>
    </div>


    <script>
    (function() {
        var chapterId = '{{.ChapterID}}';
        var pages = [];
        var chapter = null;
        var prevChapter = 0;
        var nextChapter = 0;
        var seriesId = 0;
        var loadedImages = 0;
        var lastScrollY = 0;
        var barTimeout = null;

        function showBars() {
            document.getElementById('top-bar').classList.add('bars-visible');
            document.getElementById('bottom-bar').classList.add('bars-visible');
            clearTimeout(barTimeout);
            barTimeout = setTimeout(hideBars, 3000);
        }

        function hideBars() {
            document.getElementById('top-bar').classList.remove('bars-visible');
            document.getElementById('bottom-bar').classList.remove('bars-visible');
        }

        function updateProgress() {
            if (pages.length === 0) return;
            var container = document.getElementById('pages');
            var imgs = container.querySelectorAll('img');
            if (imgs.length === 0) return;

            var scrollTop = window.scrollY;
            var viewH = window.innerHeight;
            var current = 0;

            for (var i = 0; i < imgs.length; i++) {
                var rect = imgs[i].getBoundingClientRect();
                if (rect.top < viewH * 0.5) {
                    current = i;
                }
            }

            loadedImages = Math.max(loadedImages, current + 1);
            var info = (current + 1) + '/' + pages.length;
            document.getElementById('page-info').textContent = info;
            document.getElementById('bottom-info').textContent = info;
            var pct = ((current + 1) / pages.length * 100);
            document.getElementById('progress-fill').style.width = pct + '%';

            if (seriesId > 0) {
                fetch('/api/comics/progress', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json', 'X-CSRF-Token': _csrf},
                    body: JSON.stringify({series_id: seriesId, chapter_id: parseInt(chapterId), page_index: current})
                });
            }
        }

        function loadChapter() {
            document.getElementById('loading').style.display = 'flex';
            fetch('/api/comics/chapter/' + chapterId + '/pages')
                .then(function(r) { return r.json() })
                .then(function(d) {
                    chapter = d.chapter;
                    pages = d.pages || [];
                    prevChapter = d.prev_chapter || 0;
                    nextChapter = d.next_chapter || 0;
                    seriesId = chapter ? chapter.series_id : 0;

                    document.getElementById('chapter-title').textContent = chapter ? chapter.title : '';

                    if (chapter) {
                        fetch('/api/comics/chapter/' + chapterId + '/read', {
                            method: 'POST',
                            headers: {'X-CSRF-Token': _csrf}
                        });
                    }

                    renderPages();
                })
                .catch(function(e) {
                    document.getElementById('chapter-title').textContent = 'Error loading chapter';
                    document.getElementById('loading').style.display = 'none';
                });
        }

        function renderPages() {
            var container = document.getElementById('pages');
            container.innerHTML = '';

            if (pages.length === 0) {
                container.innerHTML = '<p style="text-align:center;padding:4rem;color:#737373">No pages found</p>';
                document.getElementById('loading').style.display = 'none';
                return;
            }

            var loaded = 0;
            pages.forEach(function(pg, i) {
                var img = document.createElement('img');
                img.loading = (i < 3) ? 'eager' : 'lazy';
                img.dataset.index = i;
                img.alt = 'Page ' + (i + 1);
                img.className = 'w-full block mx-auto transition-opacity duration-300';
                img.style.opacity = '0';
                img.onload = function() {
                    img.style.opacity = '1';
                    loaded++;
                    if (loaded === pages.length) {
                        document.getElementById('loading').style.display = 'none';
                        updateProgress();
                    }
                };
                img.onerror = function() {
                    img.style.opacity = '0.3';
                    img.alt = 'Failed to load page ' + (i + 1);
                    loaded++;
                    if (loaded === pages.length) {
                        document.getElementById('loading').style.display = 'none';
                    }
                };
                img.src = pg.url;
                container.appendChild(img);
            });

            if (pages.length > 0) {
                var prevBtn = document.createElement('button');
                prevBtn.className = 'fixed bottom-4 left-4 z-[90] bg-neutral-900/90 backdrop-blur border border-neutral-700 text-neutral-300 px-4 py-2 rounded-lg text-sm font-medium hover:bg-neutral-800 hover:text-white transition-colors shadow-lg';
                prevBtn.innerHTML = '&larr; Prev Chapter';
                prevBtn.style.display = prevChapter ? '' : 'none';
                prevBtn.onclick = function() { chapterId = String(prevChapter); loadChapter(); window.scrollTo(0, 0); };
                container.appendChild(prevBtn);

                var nextBtn = document.createElement('button');
                nextBtn.className = 'fixed bottom-4 right-4 z-[90] bg-neutral-900/90 backdrop-blur border border-neutral-700 text-neutral-300 px-4 py-2 rounded-lg text-sm font-medium hover:bg-neutral-800 hover:text-white transition-colors shadow-lg';
                nextBtn.innerHTML = 'Next Chapter &rarr;';
                nextBtn.style.display = nextChapter ? '' : 'none';
                nextBtn.onclick = function() { chapterId = String(nextChapter); loadChapter(); window.scrollTo(0, 0); };
                container.appendChild(nextBtn);

                var spacer = document.createElement('div');
                spacer.style.height = '4rem';
                container.appendChild(spacer);
            }
        }

        window.addEventListener('scroll', function() {
            var sy = window.scrollY;
            if (Math.abs(sy - lastScrollY) > 50) {
                showBars();
            }
            lastScrollY = sy;
            updateProgress();
        });

        window.addEventListener('click', function(e) {
            if (e.target.tagName === 'IMG' || e.target === document.getElementById('pages')) {
                showBars();
            }
        });

        document.getElementById('progress-bar').addEventListener('click', function(e) {
            if (pages.length === 0) return;
            var rect = this.getBoundingClientRect();
            var pct = (e.clientX - rect.left) / rect.width;
            var idx = Math.floor(pct * pages.length);
            var imgs = document.getElementById('pages').querySelectorAll('img');
            if (imgs[idx]) {
                imgs[idx].scrollIntoView({behavior: 'smooth', block: 'start'});
            }
        });

        window.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft' && prevChapter) {
                chapterId = String(prevChapter);
                loadChapter();
                window.scrollTo(0, 0);
            } else if (e.key === 'ArrowRight' && nextChapter) {
                chapterId = String(nextChapter);
                loadChapter();
                window.scrollTo(0, 0);
            } else if (e.key === 'Escape') {
                window.location.href = '/comics';
            }
        });

        loadChapter();
    })();
    </script>
</body>
</html>
{{end}}
