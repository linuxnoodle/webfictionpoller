{{define "provider_config.html"}}
<!DOCTYPE html>
<html lang="en" class="bg-neutral-950 text-neutral-200">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebFiction Tracker</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="min-h-screen bg-neutral-950">
    {{template "nav" .}}
    <main class="max-w-6xl mx-auto px-4 py-6">
    <div class="max-w-xl mx-auto">
        <h1 class="text-2xl font-bold mb-6 text-neutral-100">Provider Configuration</h1>
        <div class="space-y-6">
            {{range $name, $p := .Providers}}
            <form hx-post="/admin/providers" hx-swap="none" class="bg-neutral-900 rounded-lg border border-neutral-800 p-4 space-y-3">
                <input type="hidden" name="provider_name" value="{{$name}}" />
                <div class="flex items-center justify-between">
                    <h3 class="font-semibold text-neutral-300">{{$name}}</h3>
                    {{if $p.RequiresAuth}}
                    <span class="text-xs bg-amber-900/40 text-amber-300 px-2 py-0.5 rounded">Requires Auth</span>
                    {{else}}
                    <span class="text-xs bg-emerald-900/30 text-emerald-400 px-2 py-0.5 rounded">Public</span>
                    {{end}}
                </div>
                <div>
                    <label class="block text-sm text-neutral-500 mb-1">Cookie Data</label>
                    <input type="text" name="cookie_data"
                           value="{{index $.Configs $name}}"
                           placeholder="key1=value1; key2=value2"
                           class="w-full bg-neutral-800 border border-neutral-700 rounded px-3 py-2 text-sm focus:outline-none focus:border-neutral-500" />
                </div>
                <button type="submit" class="bg-neutral-700 hover:bg-neutral-600 text-neutral-200 px-3 py-1 rounded text-sm">
                    Save
                </button>
            </form>
            {{end}}
        </div>
    </div>
    </main>
</body>
</html>
{{end}}
