{{define "login.html"}}
<!DOCTYPE html>
<html lang="en" class="bg-neutral-950 text-neutral-200">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - WebFiction Tracker</title>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-neutral-950">
    <div class="bg-neutral-900 rounded-lg border border-neutral-800 p-8 w-full max-w-sm">
        <h1 class="text-2xl font-bold text-center mb-6 text-neutral-200">WebFiction Tracker</h1>
        {{if .Error}}
        <div class="bg-red-950/50 text-red-300 rounded px-3 py-2 text-sm mb-4">{{.Error}}</div>
        {{end}}
        <form method="POST" action="/login" class="space-y-4">
            <div>
                <label class="block text-sm text-neutral-500 mb-1">Username</label>
                <input type="text" name="username" required autofocus
                       class="w-full bg-neutral-800 border border-neutral-700 rounded px-3 py-2 focus:outline-none focus:border-neutral-500" />
            </div>
            <div>
                <label class="block text-sm text-neutral-500 mb-1">Password</label>
                <input type="password" name="password" required
                       class="w-full bg-neutral-800 border border-neutral-700 rounded px-3 py-2 focus:outline-none focus:border-neutral-500" />
            </div>
            <button type="submit" class="w-full bg-neutral-700 hover:bg-neutral-600 text-neutral-200 py-2 rounded font-semibold">
                Login
            </button>
        </form>
    </div>
</body>
</html>
{{end}}
