{{define "logs.html"}}
<!DOCTYPE html>
<html lang="en" class="bg-background text-white">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logs - WebFiction Tracker</title>
    <meta name="csrf-token" content="{{.CSRFToken}}">
    <script src="/static/htmx.min.js"></script>
    <script>var _csrf="{{.CSRFToken}}";document.addEventListener('htmx:configRequest',function(e){e.detail.headers['X-CSRF-Token']=_csrf})</script>
    <script src="/static/alpine.min.js" defer></script>
    <link rel="stylesheet" href="/static/app.css">
</head>
<body class="min-h-screen bg-background">
    {{template "nav" .}}
    <main class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between mb-4 sm:mb-6 gap-2">
            <h1 class="text-2xl font-bold text-neutral-100">Logs</h1>
            <div class="flex items-center gap-2 sm:gap-3">
                <select id="log-filter" onchange="filterLogs()" class="glass-panel border border-white/5 rounded px-2 sm:px-3 py-1.5 text-sm text-muted focus:outline-none">
                    <option value="all">All</option>
                    <option value="error">Errors</option>
                    <option value="info">Info</option>
                </select>
                <button onclick="loadLogs()" class="bg-surfaceHighlight hover:bg-neutral-600 text-muted px-2 sm:px-3 py-1.5 rounded text-sm">Refresh</button>
            </div>
        </div>
        <div id="log-container" class="bg-surface border border-white/10 rounded-lg overflow-hidden">
            <div id="log-lines" class="font-mono text-xs leading-5 max-h-[75vh] overflow-y-auto p-4 space-y-0.5">
                <div class="text-muted/60">Loading logs...</div>
            </div>
        </div>
    </main>
    <script>
    function loadLogs() {
        var filter = document.getElementById('log-filter').value;
        fetch('/api/logs?lines=500')
            .then(r => r.json())
            .then(data => {
                var container = document.getElementById('log-lines');
                var lines = data.lines || [];
                if (filter !== 'all') {
                    lines = lines.filter(function(l) {
                        return l.toLowerCase().includes('[' + filter + ']');
                    });
                }
                if (lines.length === 0) {
                    container.innerHTML = '<div class="text-neutral-600">No log entries found.</div>';
                    return;
                }
                container.innerHTML = lines.map(function(line) {
                    var cls = 'text-muted/80';
                    if (line.indexOf('[ERROR]') !== -1) cls = 'text-red-400';
                    else if (line.indexOf('[INFO]') !== -1) cls = 'text-muted';
                    return '<div class="' + cls + ' hover:glass-panel/50 px-1">' + escapeHtml(line) + '</div>';
                }).join('');
                container.scrollTop = 0;
            })
            .catch(function(err) {
                document.getElementById('log-lines').innerHTML = '<div class="text-red-400">Failed to load logs: ' + err + '</div>';
            });
    }
    function filterLogs() { loadLogs(); }
    function escapeHtml(text) {
        var div = document.createElement('div');
        div.appendChild(document.createTextNode(text));
        return div.innerHTML;
    }
    loadLogs();
    </script>
</body>
</html>
{{end}}
