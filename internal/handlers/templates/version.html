{{define "version.html"}}
<!DOCTYPE html>
<html lang="en" class="bg-neutral-950 text-neutral-200">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Version - WebFiction Tracker</title>
    <meta name="csrf-token" content="{{.CSRFToken}}">
    <script src="/static/htmx.min.js"></script>
    <script>var _csrf="{{.CSRFToken}}";document.addEventListener('htmx:configRequest',function(e){e.detail.headers['X-CSRF-Token']=_csrf})</script>
    <script src="/static/alpine.min.js" defer></script>
    <link rel="stylesheet" href="/static/app.css">
    <style>
        .update-log { font-family: monospace; font-size: 12px; line-height: 1.6; white-space: pre-wrap; word-break: break-all; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .pulse-dot { animation: pulse-dot 2s ease-in-out infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; display: inline-block; }
    </style>
</head>
<body class="min-h-screen bg-neutral-950">
    {{template "nav" .}}
    <main class="max-w-xl mx-auto px-4 py-6"
          x-data="{ checking: false, updating: false, data: null, logPoll: null, serverUp: true, updateLog: null, updateDone: false, needsRestart: false }"
          x-init="
            fetch('/api/version').then(r=>r.json()).then(d=>data=d).catch(()=>serverUp=false);
            setInterval(() => {
                fetch('/api/version', {signal: AbortSignal.timeout(5000)}).then(r => { serverUp = r.ok; return r.json() }).then(d => { if(d && !updating && !updateDone) data = d }).catch(() => { if(!updating) serverUp = false });
            }, 15000);
          "
          x-ref="vpage">
        <h1 class="text-2xl font-bold mb-6 text-neutral-100">Version & Updates</h1>

        <div class="bg-neutral-900 rounded-lg border border-neutral-800 p-6 space-y-4">
            <template x-if="data">
                <div>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-neutral-500">Server status</span>
                            <span class="flex items-center gap-1.5 text-sm">
                                <span class="w-2 h-2 rounded-full pulse-dot" :class="serverUp ? 'bg-emerald-400' : 'bg-red-400'"></span>
                                <span :class="serverUp ? 'text-emerald-300' : 'text-red-300'" x-text="serverUp ? 'Connected' : 'Disconnected'"></span>
                            </span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-neutral-500">Installed version</span>
                            <span class="text-sm font-mono text-neutral-200" x-text="data.current_short"></span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-neutral-500">Full commit</span>
                            <span class="text-xs font-mono text-neutral-400" x-text="data.current_commit"></span>
                        </div>
                        <div class="border-t border-neutral-800 my-2"></div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-neutral-500">Latest version</span>
                            <span class="text-sm font-mono" :class="data.update_available ? 'text-emerald-300' : 'text-neutral-200'" x-text="data.latest_short || 'Checking...'"></span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-sm text-neutral-500">Last checked</span>
                            <span class="text-xs text-neutral-400" x-text="data.last_checked ? new Date(data.last_checked).toLocaleString() : 'Never'"></span>
                        </div>
                    </div>

                    <div x-show="data.update_available && !data.updating && !updating" class="mt-4 bg-emerald-900/30 border border-emerald-800/50 rounded-lg p-4">
                        <p class="text-emerald-300 text-sm font-semibold mb-1">Update available!</p>
                        <p class="text-xs text-neutral-400 mb-3">A newer version is available on GitHub.</p>
                        <button @click="
                            updating=true; updateDone=false; updateLog=null; serverUp=true; needsRestart=false;
                            fetch('/api/version/update', {method:'POST',headers:{'X-CSRF-Token':_csrf}}).then(r=>r.json()).then(d=>{if(d.error){updating=false;alert(d.error)}});
                            logPoll=setInterval(function(){
                                fetch('/api/version',{signal:AbortSignal.timeout(5000)}).then(function(r){
                                    if(!r.ok) throw new Error(r.status);
                                    return r.json();
                                }).then(function(d){
                                    serverUp=true;
                                    data=d;
                                    var logEl=document.getElementById('update-log');
                                    if(logEl) logEl.scrollTop=logEl.scrollHeight;
                                    if(!d.updating){
                                        clearInterval(logPoll); logPoll=null;
                                        updateLog=data.update_log;
                                        if(updateLog && updateLog.indexOf('ERROR')>=0){
                                            updating=false;
                                        } else if(updateLog && updateLog.indexOf('No restart needed')>=0){
                                            updating=false; updateDone=true;
                                        } else {
                                            needsRestart=true;
                                            var sawDown=false;
                                            var retryCount=0;
                                            var w=setInterval(function(){
                                                retryCount++;
                                                fetch('/api/version',{signal:AbortSignal.timeout(5000)}).then(function(r){
                                                    if(!r.ok) throw new Error(r.status);
                                                    return r.json();
                                                }).then(function(nd){
                                                    if(sawDown){
                                                        clearInterval(w);
                                                        serverUp=true;
                                                        data=nd;
                                                        updating=false;
                                                        updateDone=true;
                                                    }
                                                }).catch(function(){
                                                    sawDown=true;
                                                    serverUp=false;
                                                    if(retryCount>60){
                                                        clearInterval(w);
                                                        updating=false;
                                                        updateLog=(updateLog||'')+'\nTimed out waiting for server to come back.';
                                                    }
                                                });
                                            },3000);
                                        }
                                    }
                                }).catch(function(){serverUp=false});
                            }, 1000);
                        "
                                class="w-full bg-emerald-700 hover:bg-emerald-600 text-white py-2 rounded text-sm font-semibold">
                            Update Now
                        </button>
                        <details class="mt-2">
                            <summary class="text-xs text-neutral-500 cursor-pointer">Manual update instructions</summary>
                            <div class="mt-2 space-y-1">
                                <p class="text-xs text-neutral-400">On the host / in the LXC container:</p>
                                <code class="block bg-neutral-800 rounded px-3 py-2 text-xs text-neutral-300 font-mono">docker compose pull app && docker compose up -d</code>
                            </div>
                        </details>
                    </div>

                    <div x-show="updating || data.updating || updateLog" class="mt-4 bg-neutral-800/50 border border-neutral-700 rounded-lg p-4">
                        <div class="flex items-center gap-2 mb-3">
                            <svg x-show="!updateDone" class="spinner w-4 h-4 text-amber-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M12 2v4m0 12v4m-7.07-3.93l2.83-2.83m8.48-8.48l2.83-2.83M2 12h4m12 0h4M4.93 4.93l2.83 2.83m8.48 8.48l2.83 2.83"/></svg>
                            <p class="text-sm font-semibold" :class="updateDone ? 'text-emerald-300' : 'text-amber-300'" x-text="updateDone ? 'Update complete!' : 'Updating...'"></p>
                        </div>
                        <div id="update-log" class="bg-neutral-950 rounded p-3 max-h-72 overflow-y-auto">
                            <pre class="update-log text-neutral-300" x-text="updateLog || data.update_log || 'Preparing...'"></pre>
                        </div>
                        <p x-show="!updateDone" class="text-xs text-neutral-600 mt-2" x-text="needsRestart ? (serverUp ? 'Waiting for container to restart...' : 'Container restarting, waiting for server...') : 'Waiting for update to complete...'"></p>
                        <p x-show="updateDone" class="text-xs text-emerald-500 mt-2">Restart complete. Version info updated above.</p>
                    </div>

                    <div x-show="!data.update_available && !data.updating && data.latest_commit" class="mt-4 bg-neutral-800/50 rounded-lg p-3">
                        <p class="text-xs text-neutral-400">You are running the latest version.</p>
                    </div>

                    <div x-show="data.error" class="mt-4 bg-red-950/50 border border-red-800/50 rounded-lg p-3">
                        <p class="text-xs text-red-300" x-text="data.error"></p>
                    </div>

                    <button x-show="!updating && !updateDone"
                            @click="checking=true; fetch('/api/version/check', {method:'POST',headers:{'X-CSRF-Token':_csrf}}).then(r=>r.json()).then(d=>{data=d;checking=false})"
                            :disabled="checking"
                            class="mt-4 w-full bg-neutral-700 hover:bg-neutral-600 disabled:opacity-50 text-neutral-200 py-2 rounded text-sm">
                        <span x-show="!checking">Check for Updates</span>
                        <span x-show="checking">Checking...</span>
                    </button>
                </div>
            </template>
        </div>
    </main>
</body>
</html>
{{end}}
